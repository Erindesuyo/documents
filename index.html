<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Shelf - Expanded</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="home-screen">
        <h1 class="main-title">Document Shelf</h1>
        
        <div class="shelf-container">
            <div class="shelf-row">
                <div class="book"></div>
                <div class="book selectable" data-label="infinity"><span>infinity</span></div>
                <div class="book"></div>
                <div class="book tilted-left"></div>
                <div class="book"></div>
                <div class="book"></div>
                <div class="book selectable" data-label="knowledge"><span>knowledge</span></div>
                <div class="book"></div>
                <div class="book tilted-right"></div>
                <div class="book"></div>
                <div class="book selectable" data-label="Stupidness"><span>Stupidness</span></div>
                <div class="book"></div>
                <div class="book"></div>
            </div>

            <div class="shelf-row">
                <div class="book"></div>
                <div class="book selectable" data-label="not original"><span>not original</span></div>
                <div class="book"></div>
                <div class="book tilted-right"></div>
                <div class="book"></div>
                <div class="book selectable" data-label="subversive"><span>subversive</span></div>
                <div class="book"></div>
                <div class="book"></div>
                <div class="book tilted-left"></div>
                <div class="book"></div>
                <div class="book selectable" data-label="error"><span>error</span></div>
                <div class="book"></div>
                <div class="book selectable" data-label="chaos"><span>chaos</span></div>
            </div>

            <div class="shelf-row">
                <div class="book"></div>
                <div class="book"></div>
                <div class="book tilted-left"></div>
                <div class="book"></div>
                <div class="book selectable" data-label="incompleteness"><span>incompleteness</span></div>
                <div class="book selectable" data-label="completeness"><span>completeness</span></div>
                <div class="book"></div>
                <div class="book"></div>
                <div class="book tilted-right"></div>
                <div class="book"></div>
                <div class="book selectable" data-label="paradox"><span>paradox</span></div>
                <div class="book"></div>
                <div class="book"></div>
            </div>
        </div>
    </div>

    <div id="animation-screen" class="hidden">
        <div id="back-button">Back</div>
        <div id="bouncing-text">This is none of your business</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
